<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cổng Thông Tin Hoạt Động Sinh Viên</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f4f7fa;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
            line-height: 1.4;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 12px 60px; }

        /* Header */
        header { text-align: center; margin-bottom: 20px; padding: 20px 0; }
        header h1 { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin: 0; }
        header p { color: var(--text-muted); margin-top: 5px; font-size: 0.9rem; }

        /* Toolbar */
        .toolbar {
            background: white; padding: 12px; border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px;
            position: sticky; top: 10px; z-index: 100;
        }

        .filter-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .filter-tabs::-webkit-scrollbar { display: none; }

        .filter-tab {
            padding: 8px 16px; border-radius: 10px; border: none;
            background: #f1f5f9; color: var(--text-muted);
            font-weight: 700; cursor: pointer; transition: 0.2s;
            white-space: nowrap; font-size: 0.8rem;
        }
        .filter-tab.active { background: var(--accent); color: white; }

        .search-box { position: relative; margin-top: 12px; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 40px;
            border-radius: 10px; border: 1px solid #e2e8f0;
            outline: none; font-size: 0.9rem; background: #f8fafc;
        }
        .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* Responsive Grid */
        .grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1280px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        /* Card Styles */
        .card {
            background: white; border-radius: 16px;
            display: flex; flex-direction: column;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.08); }
        .card.is-closed { opacity: 0.7; filter: grayscale(0.8); background: #fafafa; }

        .card-header { padding: 16px 16px 8px; }
        .badge-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .type-tag { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 5px; background: rgba(37,99,235,0.08); color: var(--accent); text-transform: uppercase; }
        .status-tag { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 5px; }
        .status-on { background: #dcfce7; color: #166534; }
        .status-off { background: #fee2e2; color: #991b1b; }

        .card-title { font-size: 1rem; font-weight: 800; margin: 0; color: #0f172a; line-height: 1.3; height: 2.6rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-body { padding: 0 16px 12px; flex: 1; }
        .info-item { display: flex; gap: 8px; font-size: 0.8rem; margin-top: 8px; }
        .info-item i { color: var(--accent); width: 14px; text-align: center; margin-top: 2px; }
        .info-text strong { display: block; font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .card-footer { padding: 12px 16px 16px; display: flex; gap: 6px; border-top: 1px solid #f8fafc; }
        .btn { height: 38px; padding: 0 12px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 5px; flex: 1; transition: 0.2s; border: none; cursor: pointer; text-decoration: none; }
        .btn-reg { background: var(--accent); color: white; }
        .btn-detail { background: #f1f5f9; color: var(--primary); }
        .btn-share { width: 38px; flex: none; background: #fff; border: 1px solid #e2e8f0; color: var(--text-muted); }

        /* Modal / Popup Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 600px; max-height: 90vh;
            border-radius: 24px; overflow-y: auto; position: relative;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { padding: 25px 25px 15px; border-bottom: 1px solid #f1f5f9; sticky; top: 0; background: white; z-index: 10; }
        .modal-close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .modal-body { padding: 20px 25px 30px; }

        .detail-row { margin-bottom: 20px; }
        .detail-row label { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .detail-row label i { color: var(--accent); font-size: 0.9rem; }
        .detail-row p { margin: 0; font-size: 1rem; color: var(--primary); font-weight: 500; line-height: 1.5; white-space: pre-line; }

        .modal-footer { padding: 20px 25px; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 30px; flex-wrap: wrap; }
        .page-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer; }
        .page-btn.active { background: var(--accent); color: white; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); grid-column: 1/-1; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Hoạt Động Sinh Viên</h1>
        <p id="counter">Đang tải dữ liệu...</p>
    </header>

    <div class="toolbar">
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('TẤT CẢ')">Tất cả</button>
            <button class="filter-tab" onclick="setFilter('CUỘC THI')">Cuộc thi</button>
            <button class="filter-tab" onclick="setFilter('HOẠT ĐỘNG')">Hoạt động</button>
            <button class="filter-tab" onclick="setFilter('WORKSHOP')">Workshop</button>
        </div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Tìm tên chương trình..." oninput="handleSearch()">
        </div>
    </div>

    <div class="grid" id="mainGrid"></div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- Modal xem chi tiết -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-close" onclick="document.getElementById('modalOverlay').style.display='none'">&times;</span>
            <span id="modalType" class="type-tag"></span>
            <h2 id="modalTitle" style="margin: 10px 0 0; font-size: 1.4rem;"></h2>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Nội dung chi tiết sẽ đổ vào đây -->
        </div>
        <div class="modal-footer" id="modalFooter">
            <!-- Nút bấm sẽ đổ vào đây -->
        </div>
    </div>
</div>
<img src="https://api.visitorbadge.io/api/combined?path=https%3A%2F%2Fgithub.com%2FZINNODNTU%2Fhoatdongsukien&label=Lượt%20truy%20cập&labelColor=%2337d67a&countColor=%23263238&style=flat" alt="Views" />
<script>
    const sheetAPI = "https://opensheet.elk.sh/1bIoZD9x1DbtonKqhRqVf_oDGEwyiQTYzlAgG8Bi0vX4/TONGHOP";
    
    let db = [];
    let filtered = [];
    let currentPage = 1;
    let currentTab = 'TẤT CẢ';
    const perPage = 12;

    function checkIsClosed(status) {
        const s = (status || "").toLowerCase();
        return s.includes("ngưng") || s.includes("hết") || s.includes("đóng") || s.includes("dừng");
    }

    async function loadData() {
        try {
            const res = await fetch(sheetAPI);
            const data = await res.json();
            const rawData = data.filter(i => i["Tên chương trình"]).reverse();
            const openItems = rawData.filter(i => !checkIsClosed(i["Trạng thái"]));
            const closedItems = rawData.filter(i => checkIsClosed(i["Trạng thái"]));
            db = [...openItems, ...closedItems];
            applyFilters();
        } catch (e) {
            document.getElementById('counter').innerText = "Lỗi tải dữ liệu!";
        }
    }

    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        filtered = db.filter(item => {
            const matchTab = currentTab === 'TẤT CẢ' || (item["Loại"] || "").toUpperCase() === currentTab;
            const matchSearch = item["Tên chương trình"].toLowerCase().includes(search);
            return matchTab && matchSearch;
        });
        currentPage = 1;
        render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const slice = filtered.slice((currentPage - 1) * perPage, currentPage * perPage);
        document.getElementById('counter').innerText = `Hiện có ${filtered.length} hoạt động`;

        if (slice.length === 0) {
            grid.innerHTML = `<div class="empty-state">Không tìm thấy hoạt động nào phù hợp.</div>`;
            return;
        }

        slice.forEach((item, index) => {
            const isClosed = checkIsClosed(item["Trạng thái"]);
            const card = document.createElement('div');
            card.className = `card ${isClosed ? 'is-closed' : ''}`;
            card.onclick = () => showDetail(item);
            
            card.innerHTML = `
                <div class="card-header">
                    <div class="badge-row">
                        <span class="type-tag">${item["Loại"] || 'Sự kiện'}</span>
                        <span class="status-tag ${isClosed ? 'status-off' : 'status-on'}">${isClosed ? 'Hết hạn' : 'Đang mở'}</span>
                    </div>
                    <h3 class="card-title">${item["Tên chương trình"]}</h3>
                </div>
                <div class="card-body">
                    <div class="info-item"><i class="fas fa-calendar-alt"></i><div class="info-text"><strong>Thời gian</strong>${item["Thời gian"]}</div></div>
                    <div class="info-item"><i class="fas fa-location-dot"></i><div class="info-text"><strong>Địa điểm</strong>${item["Địa điểm"]}</div></div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-detail">Chi tiết</button>
                    <a href="${isClosed ? '#' : item["Link đăng ký"]}" target="_blank" class="btn btn-reg" onclick="event.stopPropagation()">${isClosed ? 'Kết thúc' : 'Đăng ký'}</a>
                </div>
            `;
            grid.appendChild(card);
        });
        renderPager();
    }

    function showDetail(item) {
        const modal = document.getElementById('modalOverlay');
        document.getElementById('modalType').innerText = item["Loại"] || 'HOẠT ĐỘNG';
        document.getElementById('modalTitle').innerText = item["Tên chương trình"];
        
        const fields = [
            { label: 'Thời gian tham gia', icon: 'fa-clock', value: item["Thời gian"] },
            { label: 'Địa điểm tổ chức', icon: 'fa-map-marker-alt', value: item["Địa điểm"] },
            { label: 'Hạn chót đăng ký', icon: 'fa- hourglass-end', value: item["Hạn đăng ký"], color: 'var(--danger)' },
            { label: 'Số lượng tuyển', icon: 'fa-users', value: item["Số lượng"] },
            { label: 'Trang phục yêu cầu', icon: 'fa-tshirt', value: item["Trang phục"] },
            { label: 'Quyền lợi sinh viên', icon: 'fa-gift', value: item["Quyền lợi"] },
            { label: 'Đơn vị phụ trách', icon: 'fa-building', value: item["Đơn vị phụ trách"] },
            { label: 'Ghi chú thêm', icon: 'fa-sticky-note', value: item["Ghi chú"] }
        ];

        let html = '';
        fields.forEach(f => {
            if (f.value && f.value !== '') {
                html += `
                    <div class="detail-row">
                        <label><i class="fas ${f.icon}"></i> ${f.label}</label>
                        <p style="color: ${f.color || 'inherit'}">${f.value}</p>
                    </div>
                `;
            }
        });

        document.getElementById('modalBody').innerHTML = html;
        
        const isClosed = checkIsClosed(item["Trạng thái"]);
        let footerHtml = `
            <button class="btn btn-share" onclick="share('${item["Tên chương trình"]}', '${item["Link đăng ký"]}')"><i class="fas fa-share-alt"></i> Chia sẻ</button>
            <a href="${isClosed ? '#' : item["Link đăng ký"]}" target="_blank" class="btn btn-reg" style="flex:2">${isClosed ? 'ĐÃ KẾT THÚC' : 'ĐĂNG KÝ NGAY'}</a>
        `;
        if (item["Link nhóm"]) {
            footerHtml += `<a href="${item["Link nhóm"]}" target="_blank" class="btn btn-group">VÀO NHÓM</a>`;
        }
        document.getElementById('modalFooter').innerHTML = footerHtml;

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Chặn cuộn trang chính
    }

    function closeModal(e) {
        if (e.target.id === 'modalOverlay') {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }

    function renderPager() {
        const total = Math.ceil(filtered.length / perPage);
        const pager = document.getElementById('pagination');
        pager.innerHTML = "";
        if(total <= 1) return;
        for(let i=1; i<=total; i++) {
            const b = document.createElement('button');
            b.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            b.innerText = i;
            b.onclick = () => { currentPage = i; render(); window.scrollTo({top:0, behavior:'smooth'}); };
            pager.appendChild(b);
        }
    }

    function setFilter(t) {
        currentTab = t;
        document.querySelectorAll('.filter-tab').forEach(btn => btn.classList.toggle('active', btn.innerText.toUpperCase() === t));
        applyFilters();
    }

    function handleSearch() { applyFilters(); }

    function share(title, url) {
        if(navigator.share) {
            navigator.share({title: title, text: 'Tham gia hoạt động này cùng mình nhé!', url: url});
        } else {
            navigator.clipboard.writeText(url);
            alert("Đã sao chép link đăng ký!");
        }
    }

    loadData();
</script>

</body>
</html>
