<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cổng Thông Tin Sinh Viên - Khoa CNTT-TT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #f8fafc;
            --it-navy: #0f172a;
            --it-blue: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --color-contest: #f59e0b;
            --color-workshop: #8b5cf6;
            --color-activity: #0ea5e9;
            --color-closed: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-body); margin: 0; color: var(--text-main); line-height: 1.4; }

        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 60px 20px 100px; text-align: center; color: white; }
        .hero h1 { font-size: 1.8rem; font-weight: 800; margin: 0; line-height: 1.2; }
        .stats-badge { display: inline-flex; background: rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 99px; margin-top: 15px; font-size: 0.9rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); }

        .container { max-width: 1400px; margin: -50px auto 60px; padding: 0 16px; }

        /* Logo Đoàn */
        .logo-doan {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo-doan img {
            width: 80px; /* Điều chỉnh kích thước logo */
            height: auto;
            margin-right: 15px;
        }

        /* Toolbar */
        .toolbar { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .filter-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { padding: 10px 20px; border-radius: 12px; border: none; background: #f1f5f9; color: var(--text-muted); font-weight: 700; cursor: pointer; white-space: nowrap; font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background: var(--it-navy); color: white; }

        .search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 15px; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px 12px 45px; border-radius: 14px; border: 1.5px solid #e2e8f0; outline: none; font-size: 0.95rem; }
        .search-box i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .month-picker { padding: 0 15px; border-radius: 14px; border: 1.5px solid #e2e8f0; font-weight: 700; background: white; cursor: pointer; outline: none; }

        /* Grid hiển thị 4 cột trên PC */
        .grid { 
            display: grid; 
            gap: 20px; 
            grid-template-columns: repeat(1, 1fr); /* Mobile: 1 cột */
        }

        @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } } /* Tablet: 2 cột */
        @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } } /* Laptop nhỏ: 3 cột */
        @media (min-width: 1280px) { .grid { grid-template-columns: repeat(4, 1fr); } } /* Màn hình lớn: 4 cột */

        /* Card Style */
        .card { background: white; border-radius: 24px; border: 1px solid #f1f5f9; display: flex; flex-direction: column; overflow: hidden; transition: 0.3s ease; position: relative; cursor: pointer; height: 100%; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1); }
        
        .card.contest { border-top: 6px solid var(--color-contest); }
        .card.workshop { border-top: 6px solid var(--color-workshop); }
        .card.activity { border-top: 6px solid var(--color-activity); }
        .card.closed { border-top: 6px solid var(--color-closed); opacity: 0.8; filter: grayscale(0.5); }

        .card-head { padding: 20px 20px 10px; }
        .tag-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .type-tag { font-size: 0.65rem; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .status-tag { font-size: 0.7rem; font-weight: 700; }
        .status-active { color: #10b981; }

        .card-title { 
            font-size: 1.05rem; 
            font-weight: 800; 
            margin: 0; 
            color: #0f172a; 
            line-height: 1.4; 
            display: -webkit-box; 
            -webkit-line-clamp: 2; /* Hiện tối đa 2 dòng tiêu đề */
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            min-height: 2.8rem;
        }

        .card-body { padding: 0 20px 15px; flex: 1; }
        .meta-group { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .meta-row { display: flex; gap: 10px; font-size: 0.85rem; align-items: flex-start; }
        .meta-row i { color: var(--it-blue); width: 16px; margin-top: 4px; text-align: center; }
        .meta-text b { display: block; font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .meta-text p { margin: 0; font-weight: 600; color: #334155; line-height: 1.4; }

        .card-foot { padding: 15px 20px 20px; display: flex; gap: 8px; border-top: 1px solid #f8fafc; margin-top: auto; }
        .btn { height: 44px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .btn-detail { background: #f1f5f9; color: var(--text-main); flex: 1; }
        .btn-reg { background: var(--it-navy); color: white; flex: 2; }
        .btn-share { width: 44px; background: white; border: 1.5px solid #e2e8f0; color: var(--text-muted); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 25px; border-radius: 50px; font-weight: 700; z-index: 10000; display: none; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .p-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: 700; cursor: pointer; }
        .p-btn.active { background: var(--it-navy); color: white; border-color: var(--it-navy); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.7); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 15px; }
        .modal-box { background: white; width: 100%; max-width: 600px; max-height: 90vh; border-radius: 28px; overflow-y: auto; }
        .modal-h { padding: 30px 30px 15px; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; background: white; z-index: 5; }
        .modal-b { padding: 20px 30px 30px; }
        .m-item { margin-bottom: 18px; }
        .m-item label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .m-item p { margin: 0; font-weight: 600; line-height: 1.5; white-space: pre-line; }

        /* Footer */
        .footer {
            background-color: var(--it-navy);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            margin-top: 40px;
        }

        .footer a {
            color: var(--it-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-doan">
        <div>
            <h1>ĐOÀN - HỘI KHOA CÔNG NGHỆ THÔNG TIN - TRUYỀN THÔNG</h1>
            <h1>TRANG THÔNG TIN VÀ SỰ KIỆN</h1>
        </div>
    </div>
    <div class="stats-badge" id="activityCount">Đang kết nối...</div>
</div>

<div class="container">
    <div class="toolbar">
        <div class="filter-tabs" id="typeTabs">
            <button class="tab-btn active" onclick="setTab('TẤT CẢ')">Tất cả</button>
            <button class="tab-btn" onclick="setTab('CUỘC THI')">Cuộc thi</button>
            <button class="tab-btn" onclick="setTab('WORKSHOP')">Workshop</button>
            <button class="tab-btn" onclick="setTab('HOẠT ĐỘNG')">Hoạt động</button>
        </div>
        <div class="search-row">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm tên hoạt động, đơn vị..." oninput="onSearch()">
            </div>
            <select id="monthFilter" class="month-picker" onchange="onMonth()">
                <option value="ALL">Mọi tháng</option>
                <option value="01">Tháng 1</option><option value="02">Tháng 2</option><option value="03">Tháng 3</option>
                <option value="04">Tháng 4</option><option value="05">Tháng 5</option><option value="06">Tháng 6</option>
                <option value="07">Tháng 7</option><option value="08">Tháng 8</option><option value="09">Tháng 9</option>
                <option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
        </div>
    </div>

    <div class="grid" id="mainGrid">
        <div class="loader" style="text-align: center; grid-column: 1/-1;">Đang tải dữ liệu hoạt động...</div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<div id="toast">✅ Đã sao chép nội dung chia sẻ!</div>

<!-- Modal chi tiết -->
<div class="modal" id="modalOverlay" onclick="closeM(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-h"><h2 id="mTitle" style="margin:0; font-size:1.3rem;"></h2></div>
        <div class="modal-b" id="mBody"></div>
        <div class="card-foot" id="mFooter"></div>
    </div>
</div>

<div class="footer">
    <p>&copy; 2026 Đoàn - Hội Khoa CNTT-TT. <br>
       Liên hệ: <a href="https://www.facebook.com/doankhoacnttdntu" target="_blank">Fanpage Đoàn - Hội Khoa CNTT-TT</a>
    </p>
</div>
<img src="https://api.visitorbadge.io/api/combined?path=https%3A%2F%2Fgithub.com%2FZINNODNTU%2Fhoatdongsukien&label=Lượt%20truy%20cập&labelColor=%2337d67a&countColor=%23263238&style=flat" alt="Views" />
<script>
    const API = "https://opensheet.elk.sh/1bIoZD9x1DbtonKqhRqVf_oDGEwyiQTYzlAgG8Bi0vX4/TONGHOP";
    let db = [], filtered = [], currPage = 1;
    let currTab = 'TẤT CẢ', currMonth = 'ALL';
    const limit = 12; // 12 thẻ mỗi trang

    const isClosed = (s) => ["ngưng", "hết", "đóng", "dừng"].some(k => (s||"").toLowerCase().includes(k));

    async function load() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            const clean = data.filter(i => i["Tên chương trình"]).reverse();
            // Ưu tiên hiển thị: Đang mở lên trước, Hết hạn sau
            db = [...clean.filter(i => !isClosed(i["Trạng thái"])), ...clean.filter(i => isClosed(i["Trạng thái"]))];
            apply();
        } catch (e) { document.getElementById('mainGrid').innerHTML = "Lỗi tải dữ liệu!"; }
    }

    function apply() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filtered = db.filter(i => {
            const mTab = currTab === 'TẤT CẢ' || (i["Loại"] || "").toUpperCase() === currTab;
            const mSrc = i["Tên chương trình"].toLowerCase().includes(query) || (i["Đơn vị phụ trách"]||"").toLowerCase().includes(query);
            let mMo = true;
            if (currMonth !== 'ALL') {
                const d = i["Thời gian"] || "";
                mMo = d.includes(`/${currMonth}/`) || d.includes(`-${currMonth}-`) || d.toLowerCase().includes(`tháng ${parseInt(currMonth)}`);
            }
            return mTab && mSrc && mMo;
        });
        currPage = 1; render();
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        document.getElementById('activityCount').innerText = `Tìm thấy ${filtered.length} hoạt động`;
        
        const start = (currPage - 1) * limit;
        const slice = filtered.slice(start, start + limit);

        if (!slice.length) { grid.innerHTML = `<div style="text-align:center; grid-column:1/-1; padding:50px; color:#64748b;">Không tìm thấy hoạt động nào.</div>`; return; }

        slice.forEach(i => {
            const closed = isClosed(i["Trạng thái"]);
            const type = (i["Loại"] || "HOẠT ĐỘNG").toUpperCase();
            let cClass = closed ? "closed" : (type === "CUỘC THI" ? "contest" : type === "WORKSHOP" ? "workshop" : "activity");

            const card = document.createElement('div');
            card.className = `card ${cClass}`;
            card.onclick = () => showM(i);
            card.innerHTML = `
                <div class="card-head">
                    <div class="tag-line">
                        <span class="type-tag">${type}</span>
                        <span class="status-tag ${closed ? '' : 'status-active'}">${closed ? 'Hết hạn' : 'Đang mở'}</span>
                    </div>
                    <h3 class="card-title">${i["Tên chương trình"]}</h3>
                </div>
                <div class="card-body">
                    <div class="meta-group">
                        <div class="meta-row"><i class="fas fa-clock"></i><div class="meta-text"><b>Thời gian</b><p>${i["Thời gian"]}</p></div></div>
                        <div class="meta-row"><i class="fas fa-gift"></i><div class="meta-text"><b>Quyền lợi</b><p>${i["Quyền lợi"] || 'Theo quy định'}</p></div></div>
                        <div class="meta-row"><i class="fas fa-building"></i><div class="meta-text"><b>Đơn vị</b><p>${i["Đơn vị phụ trách"] || 'P.CTSV'}</p></div></div>
                    </div>
                </div>
                <div class="card-foot">
                    <button class="btn btn-detail">Chi tiết</button>
                    <a href="${closed ? '#' : i["Link đăng ký"]}" target="_blank" class="btn btn-reg" onclick="event.stopPropagation()">${closed ? 'Đã đóng' : 'Đăng ký ngay'}</a>
                    <button class="btn btn-share" onclick="event.stopPropagation(); copyInfo(${JSON.stringify(i).replace(/"/g, '&quot;')})">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });
        renderPag();
    }

    function copyInfo(i) {
        const text = `${i["Tên chương trình"]}
⏰ Thời gian: ${i["Thời gian"]}
📍 Địa điểm: ${i["Địa điểm"] || 'Cập nhật sau'}
👕 Trang phục / SL: ${i["Trang phục"] || 'Tự do'} • ${i["Số lượng"] || 'Không giới hạn'}
💎 Quyền lợi: ${i["Quyền lợi"]}
🏢 Đơn vị: ${i["Đơn vị phụ trách"]}
Link đăng ký: ${i["Link đăng ký"]}`;
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        });
    }

    function renderPag() {
        const total = Math.ceil(filtered.length / limit);
        const nav = document.getElementById('pagination'); nav.innerHTML = "";
        if(total <= 1) return;
        for(let i=1; i<=total; i++) {
            const b = document.createElement('button');
            b.className = `p-btn ${i === currPage ? 'active' : ''}`;
            b.innerText = i;
            b.onclick = () => { currPage = i; render(); window.scrollTo({top: 200, behavior:'smooth'}); };
            nav.appendChild(b);
        }
    }

    function showM(i) {
        document.getElementById('mTitle').innerText = i["Tên chương trình"];
        const rows = [
            { l: '⏰ Thời gian', v: i["Thời gian"] },
            { l: '📍 Địa điểm', v: i["Địa điểm"] },
            { l: '📅 Hạn đăng ký', v: i["Hạn đăng ký"] },
            { l: '👕 Trang phục / SL', v: `${i["Trang phục"] || 'Tự do'} • ${i["Số lượng"] || 'Không giới hạn'}` },
            { l: '💎 Quyền lợi', v: i["Quyền lợi"] },
            { l: '🏢 Đơn vị', v: i["Đơn vị phụ trách"] },
            { l: '📝 Ghi chú', v: i["Ghi chú"] }
        ];
        document.getElementById('mBody').innerHTML = rows.filter(r => r.v).map(r => `<div class="m-item"><label>${r.l}</label><p>${r.v}</p></div>`).join('');
        const closed = isClosed(i["Trạng thái"]);
        document.getElementById('mFooter').innerHTML = `
            <a href="${closed ? '#' : i["Link đăng ký"]}" target="_blank" class="btn btn-reg" style="flex:2">${closed ? 'HẾT HẠN' : 'ĐĂNG KÝ NGAY'}</a>
            <button class="btn btn-detail" onclick="closeM()">ĐÓNG</button>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeM() { document.getElementById('modalOverlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function setTab(t) { currTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toUpperCase() === t)); apply(); }
    function onSearch() { apply(); }
    function onMonth() { currMonth = document.getElementById('monthFilter').value; apply(); }

    load();
</script>
</body>
</html>
